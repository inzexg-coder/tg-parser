<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2196F3" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" fill="#0d1117" rx="40"/>

  <!-- Neural network ring connections -->
  <g stroke="url(#g1)" stroke-width="0.3" opacity="0.25" fill="none">
    <line x1="100" y1="15" x2="162" y2="40"/>
    <line x1="100" y1="15" x2="38" y2="40"/>
    <line x1="100" y1="185" x2="130" y2="182"/>
    <line x1="100" y1="185" x2="70" y2="182"/>
    <line x1="15" y1="100" x2="22" y2="80"/>
    <line x1="15" y1="100" x2="20" y2="130"/>
    <line x1="185" y1="100" x2="178" y2="80"/>
    <line x1="185" y1="100" x2="180" y2="130"/>
    <line x1="100" y1="15" x2="150" y2="50"/>
    <line x1="100" y1="15" x2="50" y2="50"/>
    <line x1="100" y1="185" x2="105" y2="178"/>
    <line x1="100" y1="185" x2="155" y2="158"/>
    <line x1="100" y1="185" x2="50" y2="158"/>
    <line x1="15" y1="100" x2="28" y2="105"/>
    <line x1="185" y1="100" x2="172" y2="105"/>
  </g>

  <!-- Neuron nodes -->
  <g fill="#4CAF50" opacity="0.8">
    <circle cx="162" cy="40" r="2"/>
    <circle cx="178" cy="80" r="2"/>
    <circle cx="180" cy="130" r="2"/>
    <circle cx="165" cy="168" r="2"/>
    <circle cx="130" cy="182" r="2"/>
    <circle cx="70" cy="182" r="2"/>
    <circle cx="35" cy="168" r="2"/>
    <circle cx="20" cy="130" r="2"/>
    <circle cx="22" cy="80" r="2"/>
    <circle cx="38" cy="40" r="2"/>
  </g>
  <g fill="#2196F3" opacity="0.5">
    <circle cx="150" cy="50" r="1.5"/>
    <circle cx="172" cy="105" r="1.5"/>
    <circle cx="155" cy="158" r="1.5"/>
    <circle cx="105" cy="178" r="1.5"/>
    <circle cx="50" cy="158" r="1.5"/>
    <circle cx="28" cy="105" r="1.5"/>
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="105" cy="25" r="1.5"/>
  </g>

  <!-- OSINT star (pentagram) -->
  <g transform="translate(100,100)" filter="url(#glow)">
    <polygon points="0,-55 13,-17 52,-17 21,5 32,45 0,20 -32,45 -21,5 -52,-17 -13,-17"
             fill="none" stroke="url(#g1)" stroke-width="1.8" stroke-linejoin="round"/>
    <polygon points="0,-55 13,-17 52,-17 21,5 32,45 0,20 -32,45 -21,5 -52,-17 -13,-17"
             fill="url(#g2)" opacity="0.3"/>
    <!-- Inner pentagram -->
    <polygon points="0,-32 7,-10 30,-10 12,3 19,26 0,12 -19,26 -12,3 -30,-10 -7,-10"
             fill="none" stroke="#4CAF50" stroke-width="0.8" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- Center neuron -->
  <circle cx="100" cy="100" r="4" fill="url(#g1)" opacity="0.9"/>
  <circle cx="100" cy="100" r="6" fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.5"/>
</svg>
