<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tg · chat analyzer</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

<header class="topbar">
<div class="topbar-left">
<a href="/" class="brand-link">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
<span>tg·chat</span>
</a>
</div>
<div class="topbar-right">
<span class="file-indicator" id="fileIndicator">No file loaded</span>
</div>
</header>

<main class="main">

<section class="upload-section" id="uploadSection">
<div class="upload-box" id="uploadZone">
<input type="file" id="fileInput" accept=".json" hidden>
<div class="upload-inner">
<div class="upload-icon">
<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
</div>
<p class="upload-text">Drop your <strong>result.json</strong> here</p>
<p class="upload-hint">or click to browse · Telegram desktop & mobile exports</p>
</div>
</div>
<div class="file-badge hidden" id="fileBadge">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
<span id="fileNameText"></span>
</div>
</section>

<div class="loader-overlay hidden" id="loading">
<div class="loader-box">
<div class="loader-spinner"></div>
<p class="loader-title">Analyzing</p>
<p class="loader-detail" id="loaderDetail">reading file...</p>
</div>
</div>

<div class="error-bar hidden" id="error"></div>

<div class="results hidden" id="results">

<div class="chat-summary" id="chatSummary">
<div class="summary-avatar">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</div>
<div class="summary-text">
<h2 id="chatTitle">Chat</h2>
<div class="summary-meta">
<span class="meta-item" id="chatType">personal</span>
<span class="meta-divider">·</span>
<span class="meta-item" id="msgCount">0 messages</span>
</div>
</div>
</div>

<div class="grid-2col" id="statsGrid"></div>

<hr class="section-divider">

<div id="chartsContainer"></div>

</div>

</main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="parser.js"></script>
</body>
</html>
